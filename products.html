<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products | TrendyWear</title>
    <meta name="description" content="Explore our latest fashion products including jackets, shirts and shoes.">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav class="navbar">
        <h1 class="logo">TrendyWear</h1>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="contact.html">Contact</a></li>

    </nav>

<section class="products-section">
    <h1>Our Products</h1>
    
    <div class="product-grid">

        <div class="product">
            <img src="image/shirt.jpg" alt="White Shirt">
            <h3>Stylish Shirt</h3>
            <p>Rs. 3,500</p>
            <button class="cta-btn" onclick="addToCart('Stylish Shirt', 3500)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="image/hoodie.jpg" alt="Hoodie">
            <h3>Hoodie</h3>
            <p>Rs. 1,999</p>
            <button class="cta-btn" onclick="addToCart('Hoodie', 1999)">Add to Cart</button>
        </div>

        <div class="product">
            <img src="image/tshirt.jpg" alt="T-shirt">
            <h3>Gen-z Tshirt</h3>
            <p>Rs. 799</p>
            <button class="cta-btn" onclick="addToCart('Gen-z Tshirt', 799)">Add to Cart</button>
        </div>

    </div> </section>

<script src="script.js"></script> </body>
