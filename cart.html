<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | TrendyWear</title>
    <link rel="stylesheet" href="style.css">
</head>
<script>
    function loadCart() {
        const cart = JSON.parse(localStorage.getItem('myCart')) || [];
        const itemsDiv = document.querySelector('.cart-items');
        const totalDiv = document.querySelector('.cart-summary h3');
        const navCount = document.querySelector('.nav-links li a[href="cart.html"]');

        // Nav count update
        navCount.innerText = `Cart (${cart.length})`;

        if (cart.length > 0) {
            itemsDiv.innerHTML = ""; // Empty message hatane ke liye
            let total = 0;
            cart.forEach(item => {
                total += item.price;
                itemsDiv.innerHTML += `
                    <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #ddd;">
                        <span>${item.name}</span>
                        <span>Rs. ${item.price}</span>
                    </div>`;
            });
            totalDiv.innerText = "Total: Rs. " + total;
        }
    }
    window.onload = loadCart;
</script>
<body>

<header>
    <nav class="navbar">
        <h1 class="logo">TrendyWear</h1>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="cart.html">Cart (0)</a></li>
        </ul>
    </nav>
</header>

<section class="cart-container">
    <h2>Your Shopping Cart</h2>
    
    <div class="cart-items">
        <p>Your cart is currently empty.</p>
    </div>

    <div class="cart-summary">
        <h3>Total: Rs. 0</h3>
        <button class="cta-btn">Checkout Now</button>
        <br><br>
        <a href="products.html" style="color: #d4a373; text-decoration: none;">← Continue Shopping</a>
    </div>
</section>

<footer>
    <p>© 2026 TrendyWear Online Store</p>
</footer>

</body>
</html>
